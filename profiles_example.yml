airbnb_de_project_dbt:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SYSADMIN') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'AIRBNB_DE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'AIRBNB_WH') }}"
      schema: "{{ env_var('DBT_DEV_SCHEMA', 'dbt_dev') }}"
      threads: 4
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SYSADMIN') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'AIRBNB_DE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'AIRBNB_WH') }}"
      schema: analytics
      threads: 4
