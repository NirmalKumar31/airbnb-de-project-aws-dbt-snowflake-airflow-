version: 2

models:
  - name: silver_hosts
    columns:
      - name: host_id
        tests:
          - not_null
          - unique
      - name: is_superhost
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: silver_listings
    columns:
      - name: listing_id
        tests:
          - not_null
          - unique
      - name: instant_bookable
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: room_type
        tests:
          - accepted_values:
              arguments:
                values: ['entire home/apt', 'private room',
                         'shared room', 'hotel room']

  - name: silver_guests
    columns:
      - name: guest_id
        tests:
          - not_null
          - unique
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F', 'Other', 'Unknown']

  - name: silver_bookings
    columns:
      - name: booking_id_clean
        tests:
          - not_null
          - unique
      - name: booking_status
        tests:
          - accepted_values:
              arguments:
                values: ['pending', 'confirmed', 'completed',
                         'cancelled', 'rejected','no_show']
      - name: listing_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_listings')
                field: listing_id
      - name: host_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_hosts')
                field: host_id
      - name: guest_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_guests')
                field: guest_id

  - name: silver_reviews
    columns:
      - name: review_id
        tests:
          - not_null
          - unique
      - name: is_public
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: review_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['guest_to_host', 'host_to_guest']
      - name: listing_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_listings')
                field: listing_id

  - name: silver_availability_calendar
    columns:
      - name: listing_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_listings')
                field: listing_id
      - name: calendar_date
        tests:
          - not_null
      - name: is_available
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: silver_listing_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: event_type_clean
        tests:
          - accepted_values:
              arguments:
                values: ['view', 'click', 'save', 'booking_start',
                         'booking_complete', 'search_impression']
      - name: listing_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_listings')
                field: listing_id

  - name: quarantine_invalid_bookings
    columns:
      - name: booking_id_clean
        tests:
          - not_null
          - unique
      - name: quarantine_reason
        tests:
          - not_null
